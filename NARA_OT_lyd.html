var API_URL   = 'https://script.google.com/macros/s/AKfycbylT1DRUclDGKO3YnmvCO2IesMqOuse2A3f6eJnkbRUrKZe_TBVY6jtszwCeOxcerDt/exec';
var CLIENT_ID = (new URLSearchParams(location.search).get('c') || 'demo');

function naraAPI(action, extra) {
  if (!API_URL) return Promise.resolve(null);
  var body = Object.assign({ action: action, clientId: CLIENT_ID }, extra || {});
  return fetch(API_URL, { method: 'POST', body: JSON.stringify(body), redirect: 'follow' })
    .then(function(r){ return r.json(); })
    .catch(function(e){ console.warn('NARA API error:', e); return null; });
}

function naraLoad()         { return naraAPI('getAll'); }
function naraSaveOT(ot)     { var r=Object.assign({},ot); ['otf','ota','fs'].forEach(function(k){if(r[k]&&typeof r[k]==='object')r[k]=JSON.stringify(r[k]);}); return naraAPI('saveOT',{row:r}); }
function naraSaveCli(cli)   { return naraAPI('saveCli',{row:cli}); }
function naraDeleteCli(id)  { return naraAPI('deleteCli',{id:id}); }
function naraSaveCfg(cfg)   { return naraAPI('saveCfg',{cfg:cfg}); }
function naraSavePrev(prev) { return naraAPI('savePrev',{row:prev}); }
</script>

async function hashPwd(p){
  if(!p)return'';
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

function mkId(){const d=new Date(),p=n=>String(n).padStart(2,"0");return`${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`;}
function fmtId(id){try{const[a,b]=(id||"").split("_");return`${a.slice(6)}.${a.slice(4,6)}.${a.slice(0,4)} ${b.slice(0,2)}:${b.slice(2,4)}`;}catch{return id||"";}}
function fmtFecha(f){if(!f)return"";const[y,m,d]=f.split("-");return`${d}.${m}.${y}`;}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function getC(ot){
  if(!ot)return{bg:"#fff",br:"#e5e7eb",dot:"#d1d5db",lbl:"—"};
  if(ot.e==="Finalizada")return{bg:"#dcfce7",br:"#86efac",dot:"#16a34a",lbl:"Finalizada"};
  if(ot.ota&&!ot.otf)return{bg:"#fef9c3",br:"#fde047",dot:"#ca8a04",lbl:"OTA — Avance"};
  if(ot.hoy||ot.e==="En Proceso")return{bg:"#dbeafe",br:"#93c5fd",dot:"#2563eb",lbl:"Hoy / Ejecución"};
  if(ot.e==="Retrasada")return{bg:"#fee2e2",br:"#fca5a5",dot:"#dc2626",lbl:"Retrasada"};
  return{bg:"#fff",br:"#d1d5db",dot:"#9ca3af",lbl:"Pendiente"};
}

function genHistorial(ots,clis,emp){
  const E=emp||{n:"Libre y Digital",nit:"80171352",t:"317 804 7523",w:"www.libreydigital.co"};
  const now=new Date(),fg=`${String(now.getDate()).padStart(2,"0")}.${String(now.getMonth()+1).padStart(2,"0")}.${now.getFullYear()}`;
  const fin=ots.filter(o=>o.e==="Finalizada"),conCal=fin.filter(o=>o.cal);
  const prom=conCal.length?(conCal.reduce((s,o)=>s+(o.cal||0),0)/conCal.length).toFixed(1):"—";
  const grupos={};
  ots.forEach(o=>{const[da]=(o.id||"").split("_");const k=da?da.slice(0,4)+"-"+da.slice(4,6):"Sin fecha";if(!grupos[k])grupos[k]=[];grupos[k].push(o);});
  const MESES=["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const fmtK=k=>{if(k==="Sin fecha")return k;const[y,m]=k.split("-");return MESES[parseInt(m)]+" "+y;};
  const EC={"Finalizada":"background:#dcfce7;color:#16a34a","En Proceso":"background:#dbeafe;color:#2563eb","Pendiente":"background:#f3f4f6;color:#6b7280","Retrasada":"background:#fee2e2;color:#dc2626"};
  const chip=o=>{let e=o.e;if(o.ota&&!o.otf)e="OTA";const s=EC[e]||EC["Pendiente"];return`<span style="display:inline-block;font-size:9px;font-weight:600;padding:1px 7px;border-radius:10px;${s}">${e}</span>`;};
  const tablas=Object.keys(grupos).sort().reverse().map(k=>`<div class="sep">${fmtK(k)} — ${grupos[k].length} órdenes</div><table class="otb"><thead><tr><th>Fecha</th><th>Cliente</th><th>Tipo</th><th>Técnico</th><th>Ubicación</th><th>Estado</th><th>Cal.</th></tr></thead><tbody>${grupos[k].map(o=>`<tr><td style="font-family:monospace;font-size:10px;white-space:nowrap">${fmtId(o.id)}</td><td style="font-weight:500">${o.c}</td><td>${o.tip}</td><td>${o.r}</td><td>${o.z}</td><td>${chip(o)}</td><td style="text-align:center;font-weight:600;color:#1D9E75">${o.cal?"★"+o.cal:""}</td></tr>`).join("")}</tbody></table>`).join("");
  return`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Historial · ${E.n}</title><style>${RCSS}</style></head><body><div class="pag"><div class="hdr"><div class="mc"><div class="mi">📋</div><div><div class="mn">${E.n}</div><div class="ms">Historial de Servicios</div></div></div><div class="ts2">Registro operativo</div><div class="tt">Historial de Órdenes de Trabajo</div><div class="ch"><div class="d"></div>Generado ${fg}</div></div><div class="cu"><div class="sep">Resumen del período</div><div class="mg"><div class="mb"><div style="font-size:28px;font-weight:700;color:#085041">${ots.length}</div><div style="font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#6B6B65">Total OTs</div></div><div class="mb"><div style="font-size:28px;font-weight:700;color:#16a34a">${fin.length}</div><div style="font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#6B6B65">Finalizadas</div></div><div class="mb"><div style="font-size:28px;font-weight:700;color:#ca8a04">${ots.filter(o=>o.ota&&!o.otf).length}</div><div style="font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#6B6B65">En proceso</div></div><div class="mb"><div style="font-size:28px;font-weight:700;color:#1D9E75">★ ${prom}</div><div style="font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#6B6B65">Cal. promedio</div></div></div>${tablas}<div class="frm"><div><div class="fm">${E.n}</div><div class="fsb">NIT ${E.nit} · Tel ${E.t}</div><div class="fsb" style="color:var(--v)">${E.w}</div></div><div class="ff">Historial: ${fg} · Total: ${ots.length} registros</div></div></div><div class="fra"></div></div></body></html>`;
}

  };

  const NAV=[{id:"dash",l:"Órdenes"},...(role==="admin"?[{id:"nueva",l:"+ Nueva OT"},{id:"clis",l:"Clientes"},{id:"cal",l:"Calendario"},{id:"hist",l:"Historial"}]:[])];

  return rc("div",{style:{fontFamily:"system-ui,-apple-system,sans-serif",background:"#f3f4f6",minHeight:"100vh"}},
    rc("div",{style:{background:"#085041",padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}},
      rc("div",{style:{display:"flex",alignItems:"center",gap:10}},
        rc("span",{style:{color:"#fff",fontWeight:700,fontSize:16,letterSpacing:.5}},"NARA"),
        rc("span",{style:{color:"rgba(255,255,255,.45)",fontSize:13}},"OT"),
        rc("span",{style:{background:"rgba(255,255,255,.15)",color:"rgba(255,255,255,.8)",fontSize:10,padding:"1px 7px",borderRadius:4,marginLeft:6}},cfg.empresa.n),
        rc("span",{title:apiOk?"Conectado a Google Sheets":"Sin conexión a datos",style:{fontSize:10,marginLeft:4}},apiOk?"🟢":"🔴")
      ),
      rc("div",{style:{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}},
        !["det","config"].includes(sc)&&NAV.map(n=>rc("button",{key:n.id,onClick:()=>go(n.id),style:{background:sc===n.id?"rgba(255,255,255,.25)":n.id==="nueva"?"rgba(255,255,255,.9)":"transparent",color:n.id==="nueva"&&sc!=="nueva"?"#085041":"rgba(255,255,255,.9)",border:"none",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:n.id==="nueva"?600:400}},n.l)),
        role==="admin"&&!["det","config"].includes(sc)&&rc("button",{onClick:()=>go("config"),title:"Configuración",style:{background:sc==="config"?"rgba(255,255,255,.25)":"transparent",color:"rgba(255,255,255,.7)",border:"none",borderRadius:6,padding:"5px 8px",fontSize:15,cursor:"pointer"}},"⚙"),
        rc("button",{onClick:()=>{setRole(null);setUser(null);setSc("dash");},style:{background:"none",border:"none",color:"rgba(255,255,255,.45)",fontSize:11,cursor:"pointer",marginLeft:4}},user+" ×")
      )
    ),
    rc("div",{style:{maxWidth:760,margin:"0 auto",padding:"16px 14px 64px"}},
      sc==="dash"&&rc(Dashboard,{ots,role,user,filt,onSel:id=>go("det",id),onHoy:(id,v)=>updOT({...getOT(id),hoy:v}),onFilt:f=>setFilt(p=>p===f?"Todos":f)}),
      sc==="nueva"&&role==="admin"&&rc(NuevaOT,{clis,cfg,onSave:ot=>{saveAndAddOT(ot);go("det",ot.id);},onAddCli:c=>saveAndAddCli(c),onBack:()=>go("dash")}),
      sc==="det"&&sel&&(()=>{const ot=getOT(sel);if(!ot)return null;const cli=getCli(ot.cid);return rc(OTDetalle,{ot,cli,role,cfg,onBack:()=>go("dash"),onUpdate:o=>{updOT(o);go("dash");},onToggleHoy:(id,v)=>updOT({...getOT(id),hoy:v})});})(),
      sc==="clis"&&role==="admin"&&rc(Clientes,{clis,ots,onDeleteCli:deleteAndRemoveCli}),
      sc==="cal"&&role==="admin"&&rc(Calendario,{ots,prevs,clis,cfg,onAddPrev:p=>saveAndAddPrev(p)}),
      sc==="hist"&&role==="admin"&&rc(Historial,{ots,clis,cfg}),
      sc==="config"&&role==="admin"&&rc(Configuracion,{cfg,setCfg,onBack:()=>go("dash")})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(rc(App,null));
</script>
</body>
</html>
